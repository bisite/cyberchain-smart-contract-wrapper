version: '3.7'

services:

  # Blockchain

  test_node:
    ports:
      - '8545:8545'
      - '8546:8546'
    image: 'airdlt/cyberchain:latest'
    user: "root:root"
    restart: unless-stopped
    volumes:
      - "./data:/opt/besu/database"
      - "./config:/etc/besu/config"
    environment:
      - BESU_USER_NAME=root
    command: 
      --data-path=/opt/besu/database
      --genesis-file=/etc/besu/config/genesis.json
      --node-private-key-file=/etc/besu/config/key
      --node-private-key-mldsa-file=/etc/besu/config/keymldsa
      --node-public-key-mldsa-file=/etc/besu/config/keymldsa.pub
      --rpc-http-max-active-connections=999999
      --rpc-http-enabled 
      --rpc-http-host=0.0.0.0
      --rpc-http-api=ETH,NET,WEB3
      --rpc-ws-enabled 
      --rpc-ws-host=0.0.0.0
      --rpc-ws-port=8546
      --rpc-ws-api=ETH,NET,WEB3
      --host-allowlist="*" 
      --rpc-http-cors-origins="all"
      --ping-enabled
      --ping-url=${PING_URL:-http://host.docker.internal/api/v1/pingnodes}
      --ban-list-url=${BAN_LIST_URL:-http://host.docker.internal/api/v1/banlist}
      --geo-service-url=${GEO_LOCATION_SERVICE:-http://ip-api.com/json/@IP}
      --logging=${LOG_MODE:-INFO}
